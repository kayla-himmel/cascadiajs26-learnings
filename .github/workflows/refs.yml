name: Check @ref annotations

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate @ref annotations
        run: node check-refs.mjs
